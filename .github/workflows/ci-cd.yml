name: CI/CD Pipeline (Django + Postgres)
on:
  push:
    branches: [ main ]
    paths:
      - 'ci-cd-pipeline/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and start services
        run: |
          cd ci-cd-pipeline
          docker compose up -d --build
      
      - name: Wait for app to be healthy
        run: |
          cd ci-cd-pipeline
          for i in $(seq 1 12); do
            if docker compose ps web | grep -q "healthy"; then
              echo "Web is healthy"
              break
            fi
            echo "Waiting for web... ($i)"
            sleep 5
          done
      
      - name: Test HTTP response
        run: |
          response=$(curl -s http://localhost:8000)
          echo "Response: $response"
          echo "$response" | grep "Hello DevOps Portfolio!"
      
      - name: Show logs (on failure)
        if: failure()
        run: |
          cd ci-cd-pipeline
          docker compose logs
