name: Monitoring CI
on:
  push:
    branches: [ main ]
    paths:
      - "monitoring/**"
      - "ci-cd-pipeline/**"
  workflow_dispatch:
jobs:
  test-end-to-end:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Django + DB
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          cd ci-cd-pipeline
          docker compose build --no-cache
          docker compose up -d
          for i in $(seq 1 12); do
            if docker compose ps web | grep -q "Up"; then break; fi
            sleep 5
          done
          sleep 5
      - name: Start monitoring stack
        run: |
          cd monitoring
          docker compose build --no-cache
          docker compose up -d
          sleep 10
      - name: Wait for Prometheus to scrape Django
        run: |
          echo "Waiting for Prometheus to complete first scrape..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s http://localhost:9090/api/v1/targets | jq -r ".data.activeTargets[] | select(.labels.job==\"django\") | .health")
            echo "Attempt $i: Django target health = $STATUS"
            if [ "$STATUS" = "up" ]; then
              echo "Target is UP."
              exit 0
            fi
            sleep 5
          done
          echo "Target failed to become up within 60s."
          exit 1
      - name: Show logs on failure
        if: failure()
        run: |
          docker compose -f ci-cd-pipeline/docker-compose.yml logs
          docker compose -f monitoring/docker-compose.yml logs
