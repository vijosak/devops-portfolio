name: Monitoring CI
on:
  push:
    branches: [ main ]
    paths:
      - "monitoring/**"
      - "ci-cd-pipeline/**"
  workflow_dispatch:
jobs:
  test-end-to-end:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create shared Docker network
        run: docker network create monitoring || true
      - name: Start Django + DB
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          cd ci-cd-pipeline
          docker compose up -d --build
          for i in $(seq 1 12); do
            if docker compose ps web | grep -q "Up"; then break; fi
            sleep 5
          done
          sleep 5
      - name: Get web container IP
        run: |
          WEB_IP=$(docker inspect -f "{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}" $(docker compose -f ci-cd-pipeline/docker-compose.yml ps -q web))
          echo "WEB_IP=$WEB_IP"
          echo "WEB_IP=$WEB_IP" >> $GITHUB_ENV
      - name: Generate Prometheus config with web IP
        run: |
          mkdir -p /tmp/prometheus
          cat > /tmp/prometheus/prometheus.yml << EOF
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: "prometheus"
              static_configs:
                - targets: ["localhost:9090"]
            - job_name: "django"
              static_configs:
                - targets: ["${WEB_IP}:8000"]
          EOF
      - name: Start monitoring stack
        run: |
          cd monitoring
          export PROMETHEUS_CONFIG="/tmp/prometheus/prometheus.yml"
          docker compose -f docker-compose.yml up -d
          sleep 10
      - name: Debug – show Prometheus targets
        run: |
          echo "=== Prometheus targets ==="
          curl -s http://localhost:9090/api/v1/targets | jq .
      - name: Verify Prometheus scrapes Django
        run: |
          curl -s http://localhost:9090/api/v1/targets | jq -e ".data.activeTargets[] | select(.labels.job==\"django\") | .health" | grep -q "up"
      - name: Show logs on failure
        if: failure()
        run: |
          docker compose -f ci-cd-pipeline/docker-compose.yml logs
          docker compose -f monitoring/docker-compose.yml logs
