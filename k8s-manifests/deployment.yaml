apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
      - name: app
        image: ci-cd-pipeline-web
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgres://portfolio:portfolio123@db:5432/portfoliodb"
        - name: DB_USER
          value: "portfolio"
        - name: DB_PASSWORD
          value: "portfolio123"
        - name: DB_NAME
          value: "portfoliodb"
