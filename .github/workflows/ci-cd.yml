name: CI/CD Pipeline (Django + Postgres)
on:
  push:
    branches: [ main ]
    paths:
      - 'ci-cd-pipeline/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and start services
        run: |
          cd ci-cd-pipeline
          docker compose up -d --build
      
      - name: Wait for DB and run migrations
        run: |
          cd ci-cd-pipeline
          docker compose exec -T web python portfolio/manage.py migrate
      
      - name: Test HTTP response
        run: |
          sleep 5   # give gunicorn a moment
          curl http://localhost:8000 | grep "Hello DevOps Portfolio"
      
      - name: Stop services
        run: |
          cd ci-cd-pipeline
          docker compose down
