name: CI/CD Pipeline (Django + Postgres)
on:
  push:
    branches: [ main ]
    paths:
      - "ci-cd-pipeline/**"
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build images
        run: |
          cd ci-cd-pipeline
          docker compose build
      - name: Start DB and run migrations
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          cd ci-cd-pipeline
          docker compose up -d db
          for i in $(seq 1 10); do
            if docker compose ps db | grep -q "healthy"; then echo "DB healthy"; break; fi
            sleep 3
          done
          docker compose run --rm web python manage.py migrate
      - name: Start web service
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          cd ci-cd-pipeline
          docker compose up -d web
          sleep 15
      - name: Test HTTP response
        run: |
          response=$(curl -s http://localhost:8000)
          echo "Response: $response"
          echo "$response" | grep "Hello DevOps Portfolio!"
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag and push Docker image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/devops-portfolio-app
          IMAGE_ID=$(echo $IMAGE_ID | tr "[A-Z]" "[a-z]")
          docker tag ci-cd-pipeline-web $IMAGE_ID:latest
          docker tag ci-cd-pipeline-web $IMAGE_ID:${{ github.sha }}
          docker push $IMAGE_ID:latest
          docker push $IMAGE_ID:${{ github.sha }}
      - name: Show logs on failure
        if: failure()
        run: |
          cd ci-cd-pipeline
          docker compose logs
