services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: portfoliodb
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfoliodb"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    mem_limit: 256m

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://portfolio:portfolio123@db:5432/portfoliodb
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 256m
    volumes:
      - .:/app

volumes:
  postgres_data:
