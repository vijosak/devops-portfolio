services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-portfoliodb}
      POSTGRES_USER: ${DB_USER:-portfolio}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portfolio123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-portfolio} -d ${DB_NAME:-portfoliodb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    mem_limit: 256m

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://${DB_USER:-portfolio}:${DB_PASSWORD:-portfolio123}@db:5432/${DB_NAME:-portfoliodb}
      DB_USER: ${DB_USER:-portfolio}
      DB_PASSWORD: ${DB_PASSWORD:-portfolio123}
      DB_NAME: ${DB_NAME:-portfoliodb}
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 256m
    volumes:
      - .:/app

volumes:
  postgres_data:
