name: CI/CD Pipeline (Django + Postgres)
on:
  push:
    branches: [ main ]
    paths:
      - 'ci-cd-pipeline/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build images
        run: |
          cd ci-cd-pipeline
          docker compose build
      
      - name: Start DB and run migrations
        run: |
          cd ci-cd-pipeline
          docker compose up -d db
          # Make sure DB is healthy
          for i in $(seq 1 10); do
            if docker compose ps db | grep -q "healthy"; then
              echo "DB healthy"
              break
            fi
            sleep 3
          done
          # Run migrations
          docker compose run --rm web python portfolio/manage.py migrate
      
      - name: Start the web service
        run: |
          cd ci-cd-pipeline
          docker compose up -d web
          # Wait for app to be healthy
          for i in $(seq 1 12); do
            if docker compose ps web | grep -q "healthy"; then
              echo "Web is healthy"
              break
            fi
            sleep 5
          done
      
      - name: Test HTTP response
        run: |
          response=$(curl -s http://localhost:8000)
          echo "Response: $response"
          echo "$response" | grep "Hello DevOps Portfolio!"
      
      - name: Show logs (on failure)
        if: failure()
        run: |
          cd ci-cd-pipeline
          docker compose logs
