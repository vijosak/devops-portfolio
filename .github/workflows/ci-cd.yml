name: CI/CD Pipeline (Django + Postgres)
on:
  push:
    branches: [ main ]
    paths:
      - 'ci-cd-pipeline/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build images
        run: |
          cd ci-cd-pipeline
          docker compose build
      
      - name: Start DB and run migrations
        run: |
          cd ci-cd-pipeline
          docker compose up -d db
          for i in $(seq 1 10); do
            if docker compose ps db | grep -q "healthy"; then
              echo "DB healthy"
              break
            fi
            sleep 3
          done
          docker compose run --rm web python portfolio/manage.py migrate
      
      - name: Debug – show web container environment
        run: |
          cd ci-cd-pipeline
          echo "=== ENVIRONMENT IN WEB CONTAINER ==="
          docker compose run --rm web env | sort
      
      - name: Start web service
        run: |
          cd ci-cd-pipeline
          docker compose up -d web
          echo "Waiting for web to start..."
          sleep 15
      
      - name: Test HTTP response (retry)
        run: |
          for i in $(seq 1 6); do
            response=$(curl -s http://localhost:8000) && echo "Response: $response" && exit 0
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Failed to connect after 6 attempts"
          exit 1
      
      - name: Show logs (on failure)
        if: failure()
        run: |
          cd ci-cd-pipeline
          docker compose logs
